<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lite-SPA - Todo Example</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- State management: expose signals-core to window.Signals -->
    <script type="module">
        import { signal, computed, effect }
            from 'https://esm.sh/@preact/signals-core';
        window.Signals = { signal, computed, effect };
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans text-gray-900">
    <!-- Navigation -->
    <nav class="p-4 bg-white border-b border-gray-200 shadow-sm flex items-center justify-between">
        <div class="flex items-center gap-6">
            <span class="text-xl font-black text-blue-600 tracking-tight">Lite-SPA Todo</span>
            <div class="flex gap-4">
                <button onclick="navigateTo('home')" class="text-gray-600 hover:text-blue-600 font-semibold transition-colors">Todo List</button>
                <button onclick="navigateTo('about')" class="text-gray-600 hover:text-blue-600 font-semibold transition-colors">Stats & About</button>
            </div>
        </div>
        <span class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full font-medium">
            Pending: <span data-header-pending class="font-bold text-blue-600">0</span>
        </span>
    </nav>

    <!-- Pages are dynamically loaded here -->
    <main id="app-content" class="p-6 flex-grow container mx-auto max-w-xl bg-white shadow-md rounded-xl mt-8 border border-gray-100"></main>

    <!-- Footer -->
    <footer class="py-6 text-center text-xs text-gray-400 border-t border-gray-100 mt-12">
        <p>Built with Lite-SPA — Zero build steps, ~3KB dependencies.</p>
    </footer>

    <!-- Script load order matters -->
    <script src="https://unpkg.com/page/page.js"></script>
    <script src="/store.js" defer></script>
    <script src="/app.js" defer></script>
</body>
</html>
